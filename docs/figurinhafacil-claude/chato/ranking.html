<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo Mais Chato · Histórico + Ranking</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=DM+Serif+Display:ital@1&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<link rel="stylesheet" href="chato.css">
<style>
body { display: grid; place-items: center; padding: 40px 16px; min-height: 100dvh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">
const { IOSDevice } = window;

// Top 10 jogos mais chatos da Copa inteira
const ranking = [
  { pos: 1, home: "Alemanha", away: "Suíça", hf: "🇩🇪", af: "🇨🇭", score: "0×0", round: "R3", pct: 82, votes: 14203, trend: "up", quote: "devolve 90 min da minha vida" },
  { pos: 2, home: "Coreia", away: "Japão", hf: "🇰🇷", af: "🇯🇵", score: "0×0", round: "R2", pct: 78, votes: 11847, trend: "flat", quote: "bocejei por 93 minutos" },
  { pos: 3, home: "Dinamarca", away: "Noruega", hf: "🇩🇰", af: "🇳🇴", score: "1×0", round: "R1", pct: 74, votes: 9823, trend: "down", quote: "escandinavo é tudo calmo" },
  { pos: 4, home: "Argélia", away: "Marrocos", hf: "🇩🇿", af: "🇲🇦", score: "0×0", round: "R3", pct: 71, votes: 8402, trend: "up", quote: "clássico sem clássico" },
  { pos: 5, home: "Sérvia", away: "Polônia", hf: "🇷🇸", af: "🇵🇱", score: "1×1", round: "R2", pct: 68, votes: 7614, trend: "up", quote: "até o VAR dormiu" },
  { pos: 6, home: "México", away: "Canadá", hf: "🇲🇽", af: "🇨🇦", score: "0×1", round: "R1", pct: 63, votes: 6920, trend: "flat", quote: "vizinhos bem-educados" },
  { pos: 7, home: "Áustria", away: "Tchéquia", hf: "🇦🇹", af: "🇨🇿", score: "2×2", round: "R3", pct: 58, votes: 5834, trend: "down", quote: "3 gols contra, quase salva" },
  { pos: 8, home: "Egito", away: "Gana", hf: "🇪🇬", af: "🇬🇭", score: "1×1", round: "R1", pct: 54, votes: 5201, trend: "up", quote: "empate mais educado do ano" },
  { pos: 9, home: "Chile", away: "Equador", hf: "🇨🇱", af: "🇪🇨", score: "0×0", round: "R2", pct: 51, votes: 4712, trend: "flat", quote: "sul-americano também dorme" },
  { pos:10, home: "País. Galês", away: "Escócia", hf: "🏴󠁧󠁢󠁷󠁬󠁳󠁿", af: "🏴󠁧󠁢󠁳󠁣󠁴󠁿", score: "1×0", round: "R3", pct: 47, votes: 4108, trend: "down", quote: "britânico clássico" },
];

const rounds = [
  { n: 1, date: "10-12 jun", matches: 16, chato: "DIN × NOR", pct: 74, closed: true },
  { n: 2, date: "13-15 jun", matches: 16, chato: "KOR × JPN", pct: 78, closed: true },
  { n: 3, date: "16-18 jun", matches: 16, chato: "ALE × SUI", pct: 82, closed: true, hot: true },
  { n: 4, date: "20-22 jun", matches: 8, chato: null, pct: null, closed: false, next: true },
];

function App() {
  const [tab, setTab] = React.useState('ranking'); // ranking | historico
  const [filter, setFilter] = React.useState('all');

  const filtered = filter === 'all' ? ranking : ranking.filter(r => r.round === filter);

  const podium = [ranking[1], ranking[0], ranking[2]]; // pos 2, 1, 3

  return (
    <IOSDevice dark>
      <div className="iscroll" style={{background:"var(--surface)", color:"var(--on-surface)"}}>

        {/* HEADER */}
        <header style={{padding:"14px 20px 10px", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:"1px solid rgba(255,255,255,.04)"}}>
          <button style={{width:36, height:36, borderRadius:10, background:"var(--surface-container)", display:"grid", placeItems:"center", color:"var(--on-surface-variant)"}}>
            <span className="material-symbols-outlined" style={{fontSize:20}}>arrow_back</span>
          </button>
          <div style={{textAlign:"center"}}>
            <div className="ff-display" style={{fontSize:".95rem"}}>Hall da Vergonha</div>
            <div style={{fontSize:".6rem", color:"var(--outline)", letterSpacing:".14em", textTransform:"uppercase"}}>Copa 2026 · em andamento</div>
          </div>
          <button style={{width:36, height:36, borderRadius:10, background:"var(--surface-container)", display:"grid", placeItems:"center", color:"var(--on-surface-variant)"}}>
            <span className="material-symbols-outlined" style={{fontSize:20}}>ios_share</span>
          </button>
        </header>

        {/* TABS */}
        <div style={{padding:"12px 20px 0", display:"flex", gap:6, background:"var(--surface)"}}>
          {[{k:'ranking',l:'🏆 Ranking geral'},{k:'historico',l:'📅 Histórico'}].map(t => (
            <button key={t.k} onClick={()=>setTab(t.k)} style={{
              flex:1, padding:"10px 8px", borderRadius:12,
              background: tab===t.k ? "var(--chato-yellow)" : "var(--surface-container)",
              color: tab===t.k ? "var(--chato-navy)" : "var(--on-surface-variant)",
              fontFamily: 'Bungee', fontSize: ".72rem", letterSpacing:".02em",
              border: tab===t.k ? "none" : "1px solid rgba(255,255,255,.05)"
            }}>{t.l}</button>
          ))}
        </div>

        {tab === 'ranking' && (
          <>
            {/* PODIUM */}
            <div style={{padding:"20px 20px 8px"}}>
              <div className="micro-cap" style={{color:"var(--chato-yellow)"}}>● Pódio da vergonha</div>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1.1fr 1fr", gap:8, marginTop:14, alignItems:"end"}}>
                {podium.map((p, i) => {
                  const realPos = [2,1,3][i];
                  const h = realPos === 1 ? 180 : realPos === 2 ? 148 : 128;
                  const medal = realPos === 1 ? '🥱' : realPos === 2 ? '😴' : '💤';
                  const color = realPos === 1 ? 'var(--chato-yellow)' : realPos === 2 ? 'var(--chato-lilac)' : 'var(--chato-paper-dim)';
                  return (
                    <div key={i} style={{display:"flex", flexDirection:"column", alignItems:"center", gap:8}}>
                      <div style={{fontSize:"1.7rem"}}>{medal}</div>
                      <div style={{fontFamily:'Bungee', fontSize:'.7rem', textAlign:'center', lineHeight:1.1}}>
                        {p.hf}<span style={{opacity:.4, margin:"0 4px"}}>×</span>{p.af}
                      </div>
                      <div style={{
                        width:"100%", height:h,
                        borderRadius:"14px 14px 6px 6px",
                        background: realPos === 1
                          ? "linear-gradient(180deg, var(--chato-yellow) 0%, #a47c2a 100%)"
                          : "var(--surface-container-high)",
                        display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"space-between",
                        padding:"12px 6px 10px",
                        color: realPos === 1 ? 'var(--chato-navy)' : 'var(--on-surface)',
                        border: realPos === 1 ? "none" : "1px solid rgba(255,255,255,.06)",
                        position:"relative"
                      }}>
                        <div style={{fontFamily:'Bungee', fontSize: realPos===1?'2rem':'1.5rem', lineHeight:1}}>{p.pct}%</div>
                        <div style={{fontFamily:'Bungee', fontSize:'2.8rem', lineHeight:1, opacity: realPos===1?1:.7, color: realPos===1?'var(--chato-navy)':color}}>{realPos}</div>
                        <div style={{fontFamily:'Space Grotesk', fontWeight:700, fontSize:'.6rem', letterSpacing:'.1em', textTransform:'uppercase', opacity:.7}}>{p.round}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* CHAMPION BAR */}
            <div style={{margin:"16px 20px 0", padding:"14px", borderRadius:16, background:"linear-gradient(135deg, var(--chato-yellow) 0%, var(--chato-yellow-hot) 100%)", color:"var(--chato-navy)", position:"relative", overflow:"hidden"}}>
              <div style={{position:"absolute", right:-10, top:-20, fontSize:110, opacity:.12, lineHeight:1}}>🥇</div>
              <div style={{fontFamily:'Bungee', fontSize:'.65rem', letterSpacing:'.14em'}}>CAMPEÃO DA VERGONHA</div>
              <div style={{display:"flex", alignItems:"center", gap:10, marginTop:8}}>
                <div style={{fontFamily:'Bungee', fontSize:"1.6rem", letterSpacing:"-.02em"}}>ALE 0×0 SUI</div>
              </div>
              <div style={{fontFamily:'DM Serif Display', fontStyle:'italic', fontSize:'1rem', marginTop:4, opacity:.85}}>"devolve 90 min da minha vida"</div>
              <div style={{marginTop:10, display:"flex", gap:12, fontFamily:'Space Grotesk', fontWeight:700, fontSize:'.72rem'}}>
                <span>📊 82% tédio</span>
                <span>🗳️ 14.2k votos</span>
                <span>📅 Rodada 3</span>
              </div>
            </div>

            {/* FILTERS */}
            <div style={{padding:"18px 20px 8px", display:"flex", alignItems:"center", gap:6, overflowX:"auto", scrollbarWidth:"none"}}>
              <span className="micro-cap" style={{color:"var(--outline)", flexShrink:0, marginRight:4}}>Filtrar:</span>
              {[{k:'all',l:'Tudo'},{k:'R1',l:'Rodada 1'},{k:'R2',l:'Rodada 2'},{k:'R3',l:'Rodada 3'}].map(f => (
                <button key={f.k} onClick={()=>setFilter(f.k)} style={{
                  padding:"6px 11px", borderRadius:9999, flexShrink:0,
                  background: filter===f.k ? "var(--on-surface)" : "transparent",
                  color: filter===f.k ? "var(--surface)" : "var(--on-surface-variant)",
                  border: filter===f.k ? "none" : "1px solid rgba(255,255,255,.1)",
                  fontFamily:'Space Grotesk', fontWeight:700, fontSize:'.72rem'
                }}>{f.l}</button>
              ))}
            </div>

            {/* RANKING LIST */}
            <div style={{padding:"4px 20px 20px", display:"flex", flexDirection:"column", gap:6}}>
              {filtered.slice(3).map((r, i) => (
                <div key={r.pos} style={{
                  display:"grid", gridTemplateColumns:"32px auto 1fr auto", gap:12, alignItems:"center",
                  padding:"12px 14px", borderRadius:14,
                  background:"var(--surface-container)", border:"1px solid rgba(255,255,255,.04)"
                }}>
                  <div style={{fontFamily:'Bungee', fontSize:'1.2rem', color:'var(--outline)', textAlign:'center'}}>{r.pos}</div>
                  <div style={{display:"flex", alignItems:"center", gap:4, fontSize:'1.1rem'}}>
                    <span>{r.hf}</span><span style={{opacity:.3, fontSize:'.7rem'}}>×</span><span>{r.af}</span>
                  </div>
                  <div style={{minWidth:0}}>
                    <div style={{fontFamily:'Space Grotesk', fontWeight:700, fontSize:'.82rem', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
                      {r.home.slice(0,3).toUpperCase()} <span style={{fontFamily:'Bungee', color:'var(--outline)', fontSize:'.75rem', margin:'0 3px'}}>{r.score}</span> {r.away.slice(0,3).toUpperCase()}
                    </div>
                    <div style={{fontSize:'.66rem', color:'var(--outline)', marginTop:2, display:'flex', gap:8}}>
                      <span>{r.round}</span>
                      <span>· {(r.votes/1000).toFixed(1)}k votos</span>
                    </div>
                  </div>
                  <div style={{display:"flex", alignItems:"center", gap:6}}>
                    <span className="material-symbols-outlined" style={{
                      fontSize:14,
                      color: r.trend==='up'?'var(--chato-green)':r.trend==='down'?'var(--chato-stamp)':'var(--outline)'
                    }}>{r.trend==='up'?'trending_up':r.trend==='down'?'trending_down':'remove'}</span>
                    <div style={{fontFamily:'Bungee', fontSize:'1rem', color:'var(--chato-yellow)'}}>{r.pct}%</div>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}

        {tab === 'historico' && (
          <div style={{padding:"20px"}}>
            <div className="micro-cap" style={{color:"var(--chato-yellow)"}}>● Timeline da Copa</div>
            <h2 className="ff-display" style={{fontSize:"1.8rem", lineHeight:.95, marginTop:8, letterSpacing:"-.02em"}}>
              O que a galera<br/>votou em <span style={{color:"var(--chato-yellow)"}}>cada rodada</span>
            </h2>

            {/* Vertical timeline */}
            <div style={{marginTop:22, position:"relative"}}>
              <div style={{position:"absolute", left:18, top:6, bottom:6, width:2, background:"rgba(255,255,255,.08)"}}/>
              {rounds.map((r, i) => (
                <div key={r.n} style={{display:"grid", gridTemplateColumns:"38px 1fr", gap:14, marginBottom:16, position:"relative"}}>
                  <div style={{
                    width:38, height:38, borderRadius:9999,
                    background: r.next ? "var(--surface-container)" : r.hot ? "var(--chato-yellow)" : "var(--surface-container-high)",
                    border: r.next ? "2px dashed var(--outline)" : "none",
                    color: r.hot ? "var(--chato-navy)" : "var(--on-surface)",
                    display:"grid", placeItems:"center",
                    fontFamily:'Bungee', fontSize:'.9rem',
                    position:'relative', zIndex:1
                  }}>R{r.n}</div>
                  <div style={{
                    padding:"14px 16px", borderRadius:14,
                    background: r.next ? "transparent" : "var(--surface-container)",
                    border: r.next ? "1px dashed rgba(255,255,255,.1)" : r.hot ? "1px solid var(--chato-yellow)" : "1px solid rgba(255,255,255,.04)"
                  }}>
                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"start", gap:10}}>
                      <div>
                        <div style={{fontFamily:'Bungee', fontSize:'.9rem'}}>Rodada {r.n}</div>
                        <div style={{fontSize:'.7rem', color:'var(--outline)', marginTop:2}}>{r.date} · {r.matches} jogos</div>
                      </div>
                      {r.closed ? (
                        <span className="chip" style={{background:"rgba(79,243,37,.1)", color:"var(--chato-green)", fontSize:'.62rem'}}>encerrada</span>
                      ) : (
                        <span className="chip" style={{background:"rgba(255,201,101,.1)", color:"var(--chato-yellow)", fontSize:'.62rem'}}>em breve</span>
                      )}
                    </div>
                    {r.chato ? (
                      <div style={{marginTop:12, padding:"10px 12px", borderRadius:10, background:"var(--surface)", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                        <div>
                          <div style={{fontSize:'.6rem', color:'var(--outline)', letterSpacing:'.14em', textTransform:'uppercase'}}>+ chato da rodada</div>
                          <div style={{fontFamily:'Bungee', fontSize:'.95rem', marginTop:3}}>{r.chato}</div>
                        </div>
                        <div style={{fontFamily:'Bungee', fontSize:'1.5rem', color:'var(--chato-yellow)'}}>{r.pct}%</div>
                      </div>
                    ) : (
                      <div style={{marginTop:10, fontSize:'.78rem', color:'var(--on-surface-variant)', fontStyle:'italic'}}>
                        aguardando os bocejos...
                      </div>
                    )}
                    {r.hot && (
                      <div style={{marginTop:8, fontSize:'.68rem', color:'var(--chato-yellow)', fontFamily:'Space Grotesk', fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase'}}>
                        🔥 rodada mais chata até agora
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>

            {/* Stats bar */}
            <div style={{marginTop:8, padding:"16px", borderRadius:16, background:"var(--chato-navy)", border:"1px solid rgba(255,201,101,.15)"}}>
              <div className="micro-cap" style={{color:"var(--chato-yellow)"}}>Copa 2026 · totais</div>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginTop:12}}>
                <div>
                  <div style={{fontFamily:'Bungee', fontSize:'1.5rem', color:'#fff'}}>48</div>
                  <div style={{fontSize:'.62rem', color:'var(--outline)', letterSpacing:'.1em', textTransform:'uppercase', marginTop:2}}>jogos votados</div>
                </div>
                <div>
                  <div style={{fontFamily:'Bungee', fontSize:'1.5rem', color:'#fff'}}>34.2k</div>
                  <div style={{fontSize:'.62rem', color:'var(--outline)', letterSpacing:'.1em', textTransform:'uppercase', marginTop:2}}>votos totais</div>
                </div>
                <div>
                  <div style={{fontFamily:'Bungee', fontSize:'1.5rem', color:'var(--chato-yellow)'}}>82%</div>
                  <div style={{fontSize:'.62rem', color:'var(--outline)', letterSpacing:'.1em', textTransform:'uppercase', marginTop:2}}>pior % da copa</div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* FOOTER CTA */}
        <div style={{padding:"0 20px 28px"}}>
          <button className="btn-meme" style={{width:"100%"}}>
            <span className="material-symbols-outlined" style={{fontSize:18}}>how_to_vote</span>
            Votar na rodada atual
          </button>
          <div style={{textAlign:"center", fontSize:".66rem", color:"var(--outline)", marginTop:10, letterSpacing:".08em"}}>
            #JogoMaisChato · Figurinha Fácil
          </div>
        </div>

      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
