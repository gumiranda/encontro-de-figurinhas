<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perfil — FigurinhaFácil</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          primary: "#95aaff", "primary-dim": "#3766ff", "on-primary": "#00247e",
          secondary: "#4ff325", "secondary-dim": "#3ee40c", "secondary-container": "#176e00", "on-secondary": "#105500",
          tertiary: "#ffc965", "tertiary-dim": "#ecaa00", "on-tertiary": "#5f4200",
          error: "#ff6e84",
          surface: "#090e1c",
          "surface-container-low": "#0d1323", "surface-container": "#13192b",
          "surface-container-high": "#181f33", "surface-container-highest": "#1e253b",
          "surface-bright": "#242b43",
          "on-surface": "#e1e4fa", "on-surface-variant": "#a6aabf",
          outline: "#9499ad", "outline-variant": "#434759",
          whatsapp: "#25d366",
        },
        fontFamily: {
          headline: ["Space Grotesk", "sans-serif"],
          body: ["Manrope", "sans-serif"],
          mono: ["JetBrains Mono", "monospace"],
        },
      },
    },
  };
</script>
<style>
  body { background: #1a1f2e; font-family: "Manrope", sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'opsz' 24; vertical-align: middle; }
  .icon-fill { font-variation-settings: 'FILL' 1, 'wght' 500, 'opsz' 24; }

  /* Page surface = exact app background */
  .app-surface {
    background: #090e1c;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(149,170,255,0.15), transparent 60%),
      radial-gradient(ellipse 50% 30% at 90% 30%, rgba(55,102,255,0.08), transparent 70%);
    color: #e1e4fa;
    font-family: "Manrope", sans-serif;
    font-weight: 500;
  }

  .text-gradient {
    background: linear-gradient(to right, #95aaff, #3766ff, #4ff325);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .glass-ethereal {
    background: rgba(13, 19, 35, 0.6);
    backdrop-filter: blur(24px) saturate(1.2);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .shadow-ambient {
    box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 4px 16px -2px rgba(0,0,0,0.2);
  }
  .shadow-ambient-lg {
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 12px 40px -8px rgba(0,0,0,0.35);
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.25rem 0.75rem; border-radius: 9999px;
    background: rgba(149,170,255,0.08);
    border: 1px solid rgba(149,170,255,0.18);
    color: #95aaff;
    font-size: 0.625rem; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    font-family: "Space Grotesk", sans-serif;
  }
  .eyebrow-green { background: rgba(79,243,37,0.08); border-color: rgba(79,243,37,0.22); color: #4ff325; }
  .eyebrow-gold { background: rgba(255,201,101,0.08); border-color: rgba(255,201,101,0.22); color: #ffc965; }
  .pulse-dot {
    width: 0.5rem; height: 0.5rem; border-radius: 9999px; background: #4ff325;
    box-shadow: 0 0 0 0 rgba(79,243,37,0.5);
    animation: pulse-dot 1.8s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { box-shadow: 0 0 0 0 rgba(79,243,37,0.5); }
    50%     { box-shadow: 0 0 0 6px rgba(79,243,37,0); }
  }

  /* Sticker primitives */
  .sticker {
    position: relative; aspect-ratio: 3/4; border-radius: 0.75rem;
    background: linear-gradient(160deg, #1e253b 0%, #13192b 100%);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden; display: flex; flex-direction: column; padding: 0.5rem;
    transition: transform 300ms cubic-bezier(.16,1,.3,1), border-color 200ms;
  }
  .sticker:hover { transform: translateY(-3px); border-color: rgba(149,170,255,0.4); }
  .sticker .photo {
    flex: 1; border-radius: 0.5rem;
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.025) 0 6px, transparent 6px 14px),
      linear-gradient(180deg, #2a3354 0%, #181f33 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: "JetBrains Mono", monospace; font-size: 0.5625rem; color: #6b7290;
  }
  .sticker .meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 0.375rem; font-family: "Space Grotesk", sans-serif;
    font-size: 0.625rem; line-height: 1;
  }
  .sticker .code { color: #e1e4fa; font-weight: 700; letter-spacing: 0.04em; }
  .sticker .flag { font-size: 0.75rem; }

  .sticker.have {
    border-color: rgba(79,243,37,0.3);
    background: linear-gradient(160deg, #0e2a08 0%, #0d1323 100%);
  }
  .sticker.have .photo {
    background:
      repeating-linear-gradient(135deg, rgba(79,243,37,0.06) 0 6px, transparent 6px 14px),
      linear-gradient(180deg, #103a04 0%, #0a1c01 100%);
    color: #4ff325;
  }
  .sticker.have .code { color: #4ff325; }
  .sticker.legend {
    background: linear-gradient(160deg, #3a2f0c 0%, #1a1408 100%);
    border-color: rgba(255,201,101,0.4);
  }
  .sticker.legend::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(115deg, transparent 30%, rgba(255,201,101,0.18) 50%, transparent 70%);
    pointer-events: none;
  }
  .sticker.legend .photo {
    background:
      repeating-linear-gradient(135deg, rgba(255,201,101,0.06) 0 6px, transparent 6px 14px),
      linear-gradient(180deg, #5f4200 0%, #2a1d00 100%);
    color: #ffc965;
  }
  .sticker.legend .code { color: #ffc965; }
  .sticker.need {
    border-style: dashed;
    border-color: rgba(149,170,255,0.25);
    background: rgba(13,19,35,0.4);
  }
  .sticker.need .photo {
    background: repeating-linear-gradient(135deg, rgba(149,170,255,0.04) 0 6px, transparent 6px 14px);
    color: #6b7290;
  }
  .sticker.need .code { color: #a6aabf; }

  /* Quantity badge for duplicates */
  .qty-badge {
    position: absolute; top: 0.4rem; right: 0.4rem;
    min-width: 1.25rem; height: 1.25rem; padding: 0 0.3125rem;
    border-radius: 9999px;
    background: #4ff325; color: #105500;
    font-family: "Space Grotesk", sans-serif; font-weight: 800;
    font-size: 0.625rem; line-height: 1.25rem; text-align: center;
    box-shadow: 0 0 12px rgba(79,243,37,0.5);
  }
  .qty-badge.gold { background: #ffc965; color: #5f4200; box-shadow: 0 0 12px rgba(255,201,101,0.5); }

  /* Buttons */
  .btn-primary {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 0.5rem; height: 2.5rem; padding: 0 1.125rem;
    border-radius: 9999px;
    background: linear-gradient(135deg, #3766ff 0%, #95aaff 100%);
    color: #00247e;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700; font-size: 0.8125rem; letter-spacing: 0.02em;
    box-shadow: 0 6px 18px -4px rgba(149,170,255,0.4), inset 0 1px 1px rgba(255,255,255,0.2);
    transition: transform 300ms, box-shadow 300ms;
    cursor: pointer; border: none;
  }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-secondary {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 0.5rem; height: 2.5rem; padding: 0 1rem;
    border-radius: 9999px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: #e1e4fa;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 600; font-size: 0.8125rem;
    transition: all 200ms; cursor: pointer;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); }
  .btn-whatsapp {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
    height: 2.75rem; padding: 0 1.25rem; border-radius: 9999px;
    background: #25d366; color: white;
    font-family: "Space Grotesk", sans-serif; font-weight: 700; font-size: 0.875rem;
    box-shadow: 0 6px 18px -4px rgba(37,211,102,0.4);
    transition: transform 300ms, background 200ms;
    cursor: pointer; border: none; width: 100%;
  }
  .btn-whatsapp:hover { background: #128c7e; transform: translateY(-1px); }
  .btn-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 2.25rem; height: 2.25rem; border-radius: 9999px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    color: #a6aabf; transition: all 200ms; cursor: pointer;
  }
  .btn-icon:hover { background: rgba(149,170,255,0.1); color: #95aaff; border-color: rgba(149,170,255,0.3); }

  /* Tabs */
  .tab {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.625rem 1rem; border-radius: 9999px;
    font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 0.8125rem;
    color: #a6aabf; cursor: pointer; transition: all 200ms;
    border: 1px solid transparent;
  }
  .tab:hover { color: #e1e4fa; background: rgba(255,255,255,0.03); }
  .tab.active {
    background: rgba(149,170,255,0.1);
    border-color: rgba(149,170,255,0.3);
    color: #95aaff;
  }

  /* Avatar */
  .avatar-ring {
    background:
      radial-gradient(circle, #95aaff 0%, #3766ff 100%);
    padding: 3px;
    border-radius: 9999px;
    box-shadow: 0 0 32px rgba(149,170,255,0.35);
  }
  .avatar-inner {
    width: 100%; height: 100%; border-radius: 9999px;
    background: linear-gradient(135deg, #2a3354, #1e253b);
    display: flex; align-items: center; justify-content: center;
    font-family: "Space Grotesk", sans-serif; font-weight: 800; color: #95aaff;
    border: 2px solid #090e1c;
  }
  .avatar-ring.public {
    background: radial-gradient(circle, #ffc965 0%, #ecaa00 100%);
    box-shadow: 0 0 32px rgba(255,201,101,0.35);
  }
  .avatar-ring.public .avatar-inner { color: #ffc965; }

  /* Progress bar */
  .progress-track {
    position: relative; height: 0.625rem; border-radius: 9999px;
    background: rgba(255,255,255,0.05);
    overflow: hidden;
  }
  .progress-fill {
    position: absolute; inset: 0 auto 0 0; border-radius: 9999px;
    background: linear-gradient(90deg, #3766ff, #95aaff, #4ff325);
    box-shadow: 0 0 12px rgba(79,243,37,0.4);
  }

  /* Card */
  .card {
    background: #13192b;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 1rem;
  }
  .card-elevated {
    background: linear-gradient(160deg, #181f33 0%, #13192b 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 1.25rem;
  }

  /* QR code grid (visual placeholder) */
  .qr-grid {
    display: grid; grid-template-columns: repeat(21, 1fr); gap: 0;
    width: 100%; aspect-ratio: 1; padding: 8%;
    background: white; border-radius: 0.75rem;
  }
  .qr-grid .cell { background: transparent; }
  .qr-grid .cell.on { background: #1a472a; }

  /* Subtle phone-like edges for narrower artboards */
  .device-shell {
    border-radius: 1.5rem;
    border: 1px solid rgba(255,255,255,0.04);
    overflow: hidden;
  }

  /* Bottom nav (mobile feel) */
  .bottom-nav {
    background: rgba(13,19,35,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .bottom-nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 0.25rem; padding: 0.625rem 0;
    color: #6b7290; font-family: "Space Grotesk", sans-serif;
    font-size: 0.625rem; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .bottom-nav-item.active { color: #95aaff; }
  .bottom-nav-item.active .material-symbols-outlined {
    filter: drop-shadow(0 0 6px rgba(149,170,255,0.5));
  }

  /* Toast / snackbar */
  .toast {
    background: rgba(13,19,35,0.95);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(79,243,37,0.3);
    color: #4ff325;
  }

  /* Scrollbar (subtle for long lists) */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="profile-data.jsx"></script>
<script type="text/babel" src="profile-pieces.jsx"></script>
<script type="text/babel" src="authenticated-profile.jsx"></script>
<script type="text/babel" src="public-profile.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<div id="root"></div>

</body>
</html>
